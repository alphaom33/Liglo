<!--at least three matching both class1 and class2-->
<anytag class="class1 class2"></anytag>
<anytag class="class1 class2"></anytag>
<anytag class="class1 class2"></anytag>
<!--one matching only class1 and containing at least 37 characters-->
<anytag class="class1">aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa</anytag>
<!--one level of nesting-->
<anytag>
    <!--one matching only class1 and containing at least 21 characters-->
    <anytag class="class1">aaaaaaaaaaaaaaaaaaaaa</anytag>
    <!--at least 105 characters-->
    aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    <!--another level of nesting-->
    <anytag></anytag>
</anytag>
